name: Build and push Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 0.13.0)'
        required: true
        default: '0.13.0'

jobs:
  build:
    runs-on: ubuntu-latest
    # aviary build installs many large conda envs (~50-60 GB). We need to evict
    # the pre-installed tools GitHub loads onto the runner to make room.
    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false        # keep language runtimes (pixi needs them)
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check available disk
        run: df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "IMAGE_TAG=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aviary:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/aviary:latest
          # Cache layers in GitHub's cache store — repeat builds skip unchanged steps
          cache-from: type=gha
          cache-to: type=gha,mode=max
